services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - AUTH_PROVIDER=${AUTH_PROVIDER:-local}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - TRUSTED_PROXY_HOPS=${TRUSTED_PROXY_HOPS:-1}
      - INSECURE_HTTP=${INSECURE_HTTP:-false}
      - MEDIA_AVIF_CRF=${MEDIA_AVIF_CRF:-30}
      - MEDIA_VIDEO_SCALE=0.5
      - MEDIA_VIDEO_MAX_BITRATE=0.7M
      - MEDIA_AV1_CRF=50
      - VOICE_ECHO_CANCELLATION=${VOICE_ECHO_CANCELLATION:-true}
      - VOICE_NOISE_SUPPRESSION=${VOICE_NOISE_SUPPRESSION:-true}
      - VOICE_AUTO_GAIN_CONTROL=${VOICE_AUTO_GAIN_CONTROL:-true}
      - VOICE_OPUS_BITRATE=${VOICE_OPUS_BITRATE:-32000}
      - VOICE_OPUS_STEREO=${VOICE_OPUS_STEREO:-false}
      - FFMPEG_MEMORY_LIMIT_MB=${FFMPEG_MEMORY_LIMIT_MB:-512}
      - MEDIA_IMAGE_MAX_DIMENSION=${MEDIA_IMAGE_MAX_DIMENSION:-1920}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: ${CONTAINER_MEM_LIMIT:-2g}
    pids_limit: 256
