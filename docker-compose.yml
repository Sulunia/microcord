services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - AUTH_PROVIDER=${AUTH_PROVIDER:-local}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - INSECURE_HTTP=${INSECURE_HTTP:-false}
      - MEDIA_VIDEO_SCALE=0.5
      - MEDIA_VIDEO_MAX_BITRATE=0.7M
      - MEDIA_AV1_CRF=50
