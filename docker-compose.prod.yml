services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "${HTTP_PORT:-80}:8080"
      - "${HTTPS_PORT:-443}:8443"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ${SSL_CERT_DIR:-./certs}:/certs:ro
    environment:
      - PYTHONUNBUFFERED=1
      - AUTH_PROVIDER=${AUTH_PROVIDER:-local}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8000}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - TRUSTED_PROXY_HOPS=${TRUSTED_PROXY_HOPS:-1}
      - INSECURE_HTTP=${INSECURE_HTTP:-false}
      - ICE_SERVERS=${ICE_SERVERS:-}
      - VOICE_ECHO_CANCELLATION=${VOICE_ECHO_CANCELLATION:-true}
      - VOICE_NOISE_SUPPRESSION=${VOICE_NOISE_SUPPRESSION:-true}
      - VOICE_AUTO_GAIN_CONTROL=${VOICE_AUTO_GAIN_CONTROL:-true}
      - VOICE_OPUS_BITRATE=${VOICE_OPUS_BITRATE:-32000}
      - VOICE_OPUS_STEREO=${VOICE_OPUS_STEREO:-false}
      - FFMPEG_MEMORY_LIMIT_MB=${FFMPEG_MEMORY_LIMIT_MB:-512}
      - MEDIA_IMAGE_MAX_DIMENSION=${MEDIA_IMAGE_MAX_DIMENSION:-1920}
      - MEDIA_AV1_CRF=${MEDIA_AV1_CRF:-45}
      - MEDIA_VIDEO_SCALE=${MEDIA_VIDEO_SCALE:-}
      - MEDIA_VIDEO_MAX_BITRATE=${MEDIA_VIDEO_MAX_BITRATE:-}
      - APP_NAME=${APP_NAME:-}
      - APP_TAGLINE=${APP_TAGLINE:-}
      - VOICE_CHANNEL_NAME=${VOICE_CHANNEL_NAME:-}
      - SCREENSHARE_WIDTH=${SCREENSHARE_WIDTH:-}
      - SCREENSHARE_HEIGHT=${SCREENSHARE_HEIGHT:-}
      - SCREENSHARE_FRAME_RATE=${SCREENSHARE_FRAME_RATE:-}
      - SSL_CERTFILE=/certs/fullchain.pem
      - SSL_KEYFILE=/certs/privkey.pem
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: ${CONTAINER_MEM_LIMIT:-2g}
    pids_limit: 256
